name: Monitor Content

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
    - cron: '0 20 * * *' # 20:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHSCOPE_API_URL: ${{ secrets.DASHSCOPE_API_URL }}
          DASHSCOPE_MODEL_CLASSIFY: ${{ secrets.DASHSCOPE_MODEL_CLASSIFY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python -m monitors.main

      - name: Commit and push changes
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/seen_urls.json
          git diff --cached --quiet || git commit -m "docs: update seen_urls [skip ci]"
          git push
